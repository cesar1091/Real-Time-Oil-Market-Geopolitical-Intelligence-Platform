name: Oil Market Scraping Scheduler

on:

  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:

jobs:

  scrape:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run news scraper
        run: |
          python -m scrapping.news_scraper

      - name: Run oil price scraper
        run: |
          python -m scrapping.oil_prices_scraper

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/

          git commit -m "Automated scraping update" || echo "No changes to commit"

          git push